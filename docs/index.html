<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Blue — Entry Point</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      opacity: 0.16;
      pointer-events: none;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(102, 221, 198, 0.08), transparent 35%),
        linear-gradient(180deg, rgba(6, 16, 20, 0.85), rgba(6, 16, 20, 0.94));
      z-index: -1;
      pointer-events: none;
    }

    .terminal {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

<video autoplay muted loop playsinline id="bgVideo">
  <source src="assets/intro.mp4" type="video/mp4">
</video>

<div class="bg-overlay"></div>

<div class="terminal">
  <h1>HOSPITAL INCIDENT ACCESS</h1>
  <p class="subtle-note">ST. RAPHAEL MEDICAL CENTER</p>
  <p class="subtle-note">Patient Safety Review System</p>

  <div id="boot"></div>

  <div id="inputSection" style="display:none;">
    <hr>

    <p>> Enter team designation:</p>
    <input type="text" id="teamInput" placeholder="Team name">

    <p>> Enter command to proceed:</p>
    <input type="text" id="commandInput" placeholder="Type INITIATE">

    <button type="button" onclick="runCommand()">EXECUTE</button>

    <p id="response"></p>
  </div>
</div>

<script>
const bootLines = [
  "> Connecting to Hospital Incident Access Portal...",
  "> Verifying Review Committee Credentials...",
  "> Loading Clinical Incident Database...",
  "> Access Gateway Ready."
];

let i = 0;
const bootDiv = document.getElementById("boot");

function typeLine() {
  if (i < bootLines.length) {
    const p = document.createElement("p");
    bootDiv.appendChild(p);

    let text = bootLines[i];
    let j = 0;

    const interval = setInterval(() => {
      p.textContent = text.slice(0, j++);
      if (j > text.length) {
        clearInterval(interval);
        i++;
        setTimeout(typeLine, 250);
      }
    }, 20);
  } else {
    document.getElementById("inputSection").style.display = "block";
  }
}

function runCommand() {
  const team = document.getElementById("teamInput").value.trim();
  const command = document.getElementById("commandInput").value.trim().toUpperCase();
  const response = document.getElementById("response");

  if (!team) {
    response.innerHTML = "> TEAM DESIGNATION REQUIRED";
    return;
  }

  localStorage.setItem("teamName", team);

  if (command === "INITIATE" || command === "ACCESS") {
    response.innerHTML = "> ACCESS GRANTED...";
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1200);
  } else {
    response.innerHTML = "> INVALID COMMAND";
  }
}

window.onload = () => {
  setTimeout(typeLine, 700);
};
</script>

</body>
</html>
