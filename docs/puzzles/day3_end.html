<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Blue — Root Cause Analysis Complete</title>
  <link rel="stylesheet" href="../styles.css">

  <style>

    .glitch {
      animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0,0); }
      25% { transform: translate(2px,-2px); }
      50% { transform: translate(-2px,2px); }
      75% { transform: translate(2px,2px); }
      100% { transform: translate(0,0); }
    }

    .warning {
      color: #ff6b6b;
      margin-top: 20px;
    }

  </style>

</head>
<body>

<div class="terminal">

  <h1>ROOT CAUSE ANALYSIS COMPLETE</h1>

  <p>> Final review processing...</p>

  <div id="content"></div>

</div>

<script>

const lines = [

  "> Incident review finalized.",
  "> Committee findings verified.",
  "",
  "> Timeline reconstruction complete.",
  "> Clinical trigger identified.",
  "> Contributing factor identified.",
  "",
  "> Compiling final report...",
  ""
];

let i = 0;

const contentDiv = document.getElementById("content");

function typeLine() {

  if (i < lines.length) {

    const p = document.createElement("p");
    contentDiv.appendChild(p);

    let text = lines[i];
    let j = 0;

    const interval = setInterval(() => {

      p.textContent = text.slice(0, j++);

      if (j > text.length) {

        clearInterval(interval);

        i++;

        setTimeout(typeLine, 350);
      }

    }, 20);

  }

  else {

    triggerFinal();
  }
}

function triggerFinal() {

  document.body.classList.add("glitch");

  const report = document.createElement("div");

  report.innerHTML = `

    <br>

    <h2>FINAL RCA SUMMARY</h2>

    <p><strong>Event</strong></p>
    <p>Code Blue activated at 10:47</p>

    <br>

    <p><strong>Clinical Trigger</strong></p>
    <p>Medication Interaction</p>

    <br>

    <p><strong>Contributing Factor</strong></p>
    <p>Escalation Delay</p>

    <br>

    <p><strong>Patient Outcome</strong></p>
    <p>Patient stabilized following resuscitative efforts.</p>

    <br>

    <p><strong>Review Determination</strong></p>
    <p>No malicious intent identified.</p>
    <p>No equipment malfunction identified.</p>
    <p>Event classified as preventable.</p>

    <br>

    <p class="warning">
      > CASE ARCHIVED
    </p>

  `;

  contentDiv.appendChild(report);

  setTimeout(() => {

    const finalMsg = document.createElement("p");

    finalMsg.innerHTML = `

      <br>

      > Thank you for completing the review.

      <br><br>

      > Session complete.

    `;

    contentDiv.appendChild(finalMsg);

  }, 1500);

}

window.onload = () => {

  setTimeout(typeLine, 700);

};

</script>

</body>
</html>
