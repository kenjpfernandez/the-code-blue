<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Blue — Root Cause Analysis Complete</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .warning {
      color: #ff6b6b;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="terminal">

  <h1>ROOT CAUSE ANALYSIS COMPLETE</h1>

  <p id="teamDisplay"></p>
  <p id="timestampDisplay"></p>

  <p>> Final review processing...</p>

  <div id="content"></div>

</div>

<script>
const team = localStorage.getItem("teamName") || "UNKNOWN";
document.getElementById("teamDisplay").innerHTML = `> Review Committee: ${team}`;

const lines = [
  "> Root Cause Analysis complete.",
  "> Findings validated.",
  "",
  "> Timeline reconstruction complete.",
  "> Clinical trigger identified.",
  "> Contributing factor identified.",
  "",
  "> Compiling final report...",
  ""
];

let i = 0;
const contentDiv = document.getElementById("content");

function typeLine() {
  if (i < lines.length) {
    const p = document.createElement("p");
    contentDiv.appendChild(p);

    let text = lines[i];
    let j = 0;

    const interval = setInterval(() => {
      p.textContent = text.slice(0, j++);
      if (j > text.length) {
        clearInterval(interval);
        i++;
        setTimeout(typeLine, 350);
      }
    }, 20);
  } else {
    triggerFinal();
  }
}

function triggerFinal() {
  const report = document.createElement("div");

  report.innerHTML = `

    <br>

    <h2>FINAL RCA SUMMARY</h2>

    <p><strong>REVIEW COMMITTEE</strong></p>
    <p>${team}</p>

    <br>

    <p><strong>EVENT</strong></p>
    <p>Code Blue activated at 10:47</p>

    <br>

    <p><strong>PRIMARY CLINICAL TRIGGER</strong></p>
    <p>Medication Interaction</p>

    <br>

    <p><strong>CONTRIBUTING FACTOR</strong></p>
    <p>Escalation Delay</p>

    <br>

    <p><strong>PATIENT OUTCOME</strong></p>
    <p>Patient stabilized following resuscitative efforts.</p>

    <br>

    <p><strong>REVIEW COMMITTEE DETERMINATION</strong></p>
    <p>The event was determined to be preventable.</p>
    <p>Warning signs were identified prior to clinical deterioration.</p>
    <p>A delay occurred between recognition of worsening symptoms and escalation of care.</p>

    <br>

    <p class="warning">
      > CASE ARCHIVED
    </p>

  `;

  contentDiv.appendChild(report);

  setTimeout(() => {
    if (!localStorage.getItem("day3Timestamp")) {
      localStorage.setItem(
        "day3Timestamp",
        new Date().toLocaleString("en-US", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        })
      );
    }

    document.getElementById("timestampDisplay").innerHTML =
      `> Completion Time: ${localStorage.getItem("day3Timestamp")}`;

    const archiveSound = new Audio("../assets/archive.mp3");
    archiveSound.volume = 0.6;
    archiveSound.play().catch(() => {});

    const finalMsg = document.createElement("p");
    finalMsg.innerHTML = `
      <br>
      > Thank you for completing the review.
      <br><br>
      > Session complete.
    `;
    contentDiv.appendChild(finalMsg);
  }, 1500);
}

window.onload = () => {
  setTimeout(typeLine, 700);
};
</script>

</body>
</html>
