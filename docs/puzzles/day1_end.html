<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Blue — Day 1 Complete</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .glitch {
      animation: glitch 0.2s 3;
    }

    @keyframes glitch {
      0% { transform: translate(0,0); }
      25% { transform: translate(2px,-2px); }
      50% { transform: translate(-2px,2px); }
      75% { transform: translate(2px,2px); }
      100% { transform: translate(0,0); }
    }

    .warning {
      color: #ff5c5c;
      margin-top: 20px;
    }

    .next-link {
      display: block;
      margin-top: 30px;
      color: #00ff9f;
      text-decoration: none;
      font-weight: bold;
    }

    .next-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="terminal">
  <h1>DAY 1 REVIEW COMPLETE</h1>
  <p>> Processing incident timeline...</p>

  <div id="content"></div>
  <div id="nextPhase"></div>
</div>

<script>
const lines = [
  "> Code Blue activation time confirmed.",
  "> Timeline reconstruction complete.",
  "> Patient deterioration documented.",
  "",
  "> Initial review indicates a clinical event.",
  "> Root cause not yet confirmed.",
  "",
  "> Medication records pending correlation.",
  "> Pharmacy review scheduled.",
  "",
  "> INCIDENT FILE SEALED"
];

let i = 0;
const contentDiv = document.getElementById("content");

function typeLine() {
  if (i < lines.length) {
    const p = document.createElement("p");
    contentDiv.appendChild(p);

    let text = lines[i];
    let j = 0;

    const interval = setInterval(() => {
      p.textContent = text.slice(0, j++);
      if (j > text.length) {
        clearInterval(interval);
        i++;
        setTimeout(typeLine, 350);
      }
    }, 20);
  } else {
    triggerFinal();
  }
}

function triggerFinal() {
  document.body.classList.add("glitch");

  const warning = document.createElement("p");
  warning.className = "warning";
  warning.innerHTML = "> REVIEW TRANSITIONED TO PHASE 2";
  contentDiv.appendChild(warning);

  setTimeout(() => {
    const finalMsg = document.createElement("p");
    finalMsg.innerHTML = "<br>> You were not supposed to close the file this early.";
    contentDiv.appendChild(finalMsg);

    localStorage.setItem("day1Complete", "true");

    setTimeout(showNextPhase, 1500);
  }, 1500);
}

function showNextPhase() {
  const container = document.getElementById("nextPhase");

  const p1 = document.createElement("p");
  p1.innerHTML = "> New directive available...";

  const p2 = document.createElement("p");
  p2.innerHTML = "> Awaiting investigator input...";

  const link = document.createElement("a");
  link.href = "../terminal_day2.html";
  link.className = "next-link";
  link.innerHTML = "> INITIATE PHASE 2";

  container.appendChild(p1);
  container.appendChild(p2);
  container.appendChild(document.createElement("br"));
  container.appendChild(link);
}

window.onload = () => {
  setTimeout(typeLine, 700);
};
</script>

</body>
</html>
