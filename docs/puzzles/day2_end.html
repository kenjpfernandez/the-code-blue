<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Blue — Day 2 Complete</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .glitch {
      animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0,0); }
      25% { transform: translate(2px,-2px); }
      50% { transform: translate(-2px,2px); }
      75% { transform: translate(2px,2px); }
      100% { transform: translate(0,0); }
    }

    .warning {
      color: #ff6b6b;
      margin-top: 20px;
    }

    .next-link {
      display: block;
      margin-top: 30px;
      color: #00ff9f;
      text-decoration: none;
      font-weight: bold;
    }

    .next-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="terminal">

  <h1>ROOT CAUSE REVIEW</h1>
  <p>> Processing medication review...</p>

  <div id="content"></div>
  <div id="nextPhase"></div>

</div>

<script>
const lines = [
  "> Pharmacy records reviewed.",
  "> Physician orders cross-checked.",
  "> Lab results confirmed critical value.",
  "",
  "> Interaction warning documented.",
  "> Override recorded.",
  "> Clinical deterioration followed.",
  "",
  "> Root cause classified as medication-related.",
  "",
  "> INCIDENT FILE SEALED"
];

let i = 0;
const contentDiv = document.getElementById("content");

function typeLine() {
  if (i < lines.length) {
    const p = document.createElement("p");
    contentDiv.appendChild(p);

    let text = lines[i];
    let j = 0;

    const interval = setInterval(() => {
      p.textContent = text.slice(0, j++);
      if (j > text.length) {
        clearInterval(interval);
        i++;
        setTimeout(typeLine, 350);
      }
    }, 20);
  } else {
    triggerFinal();
  }
}

function triggerFinal() {
  document.body.classList.add("glitch");

  const warning = document.createElement("p");
  warning.className = "warning";
  warning.innerHTML = "> REVIEW TRANSITIONED TO PHASE 3";
  contentDiv.appendChild(warning);

  setTimeout(() => {
    const finalMsg = document.createElement("p");
    finalMsg.innerHTML = "<br>> You were not supposed to close the file this early.";
    contentDiv.appendChild(finalMsg);

    localStorage.setItem("day2Complete", "true");

    setTimeout(showNextPhase, 1500);
  }, 1500);
}

function showNextPhase() {
  const container = document.getElementById("nextPhase");

  const p1 = document.createElement("p");
  p1.innerHTML = "> New directive available.";

  const p2 = document.createElement("p");
  p2.innerHTML = "> Awaiting investigator input...";

  const link = document.createElement("a");
  link.href = "../terminal_day3.html";
  link.className = "next-link";
  link.innerHTML = "> INITIATE PHASE 3";

  container.appendChild(p1);
  container.appendChild(p2);
  container.appendChild(document.createElement("br"));
  container.appendChild(link);
}

window.onload = () => {
  setTimeout(typeLine, 700);
};
</script>

</body>
</html>
