<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Blue — Secure Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="terminal">
  <h1>SECURE HOSPITAL ACCESS</h1>

  <p id="teamDisplay"></p>
  <p>> Authentication required</p>

  <input type="text" id="username" placeholder="Username"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button type="button" onclick="login()">LOGIN</button>

  <p id="loginResponse"></p>
</div>

<script>
const team = localStorage.getItem("teamName") || "UNKNOWN";
document.getElementById("teamDisplay").innerHTML = `> Team: ${team}`;

function login() {
  const user = document.getElementById("username").value.trim().toLowerCase();
  const pass = document.getElementById("password").value.trim().toLowerCase();
  const response = document.getElementById("loginResponse");

  if (user === "codeblue" && pass === "review314") {
    localStorage.setItem("day1Complete", "false");
    response.innerHTML = "> ACCESS GRANTED...";
    setTimeout(() => {
      window.location.href = "terminal_day1.html";
    }, 1200);
  } else {
    response.innerHTML = "> ACCESS DENIED";
  }
}
</script>

</body>
</html>
